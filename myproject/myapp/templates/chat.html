<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with AI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .chat-container {
            width: 400px;
            margin: auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            position: relative; /* Для позиционирования кнопок */
        }
        .chat-box {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .message {
            margin: 10px 0;
        }
        .user {
            text-align: right;
            color: blue;
        }
        .ai {
            text-align: left;
            color: green;
        }
        input[type="text"] {
            width: calc(100% - 22px);
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-right: 10px; /* Отступ для кнопки */
        }
        button {
            padding: 10px;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .alert {
            color: red;
            margin-top: 10px;
        }
        .auth-buttons {
            position: absolute; /* Позиционирование кнопок */
            top: 10px;
            right: 10px;
        }
        .send-button {
            background-color: #25D366; /* Цвет кнопки отправки */
            width: 50px; /* Ширина кнопки */
            height: 50px; /* Высота кнопки */
            border-radius: 50%; /* Круглая форма */
            font-size: 20px; /* Размер шрифта */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header {
            display: flex;
            justify-content: space-between; /* Выравнивание заголовка и имени пользователя */
            align-items: center; /* Центрирование по вертикали */
        }
        .user-name {
            color: gray; /* Цвет имени пользователя */
        }
        .logout-button {
            margin-left: 10px;
            color: red;
            text-decoration: none;
        }
        .login-button {
            margin-left: 10px;
            color: blue;
            text-decoration: none;
        }
        #chat-container {
            display: none; /* Скрыто по умолчанию */
            position: fixed;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            background: white;
            box-shadow: -2px 0 5px rgba(0,0,0,0.5);
            z-index: 1000;
            overflow-y: auto; /* Прокрутка, если сообщений много */
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <form method="post" action="{% if user.is_authenticated %}{% url 'logout' %}{% else %}{% url 'login' %}{% endif %}" style="display: inline;"> <!-- Одна форма для входа/выхода -->
                {% csrf_token %}
                <button class="auth-button" id="auth-button">
                    {% if user.is_authenticated %}
                        Выйти
                    {% else %}
                        Войти
                    {% endif %}
                </button>
            </form>
            <h1>Chat with AI</h1>
            {% if user.is_authenticated %}
                <div class="user-name">{{ user.username }}</div> <!-- Имя пользователя -->
            {% endif %}
        </div>
        <div class="chat-box" id="chat-box">
            {% for message in messages %}
                <div class="message {% if message.user_message %}user{% else %}ai{% endif %}">
                    {% if message.user_message %}{{ message.user_message }}{% else %}AI: {{ message.ai_response }}{% endif %}
                </div>
            {% endfor %}
        </div>
        
        <div class="input-container" style="display: flex; align-items: center;"> <!-- Обертка для поля ввода и кнопки -->
            <input type="text" id="user-input" placeholder="Type a message..." />
            <button class="send-button" id="send-button">➤</button> <!-- Кнопка отправки -->
        </div>
        
        <div id="alert-message" class="alert" style="display: none;"></div>
    </div>
    <div id="chat-container" style="display: none; position: fixed; top: 0; right: 0; width: 50%; height: 100%; background: white; box-shadow: -2px 0 5px rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto;">
        <div class="chat-box" id="chat-box">
            <!-- Сообщения будут отображаться здесь -->
        </div>
        <div class="input-container" style="display: flex; align-items: center;">
            <input type="text" id="user-input" placeholder="Type a message..." />
            <button class="send-button" id="send-button">➤</button>
        </div>
        <button id="fullscreen-button">Fullscreen</button>
    </div>
    <script>
        document.getElementById('send-button').addEventListener('click', () => {
            const userInput = document.getElementById('user-input').value;
            const chatBox = document.getElementById('chat-box');
            const alertMessage = document.getElementById('alert-message');

            // Проверка, вошел ли пользователь в систему
            const isAuthenticated = {{ user.is_authenticated|lower }};

            if (!isAuthenticated) {
                alertMessage.textContent = "You need to log in to send a message.";
                alertMessage.style.display = 'block';
                return;
            }

            // Скрыть сообщение об ошибке
            alertMessage.style.display = 'none';

            // Отображение сообщения пользователя
            chatBox.innerHTML += `<div class="message user">${userInput}</div>`;
            document.getElementById('user-input').value = ''; // Очистка поля ввода

            // Отправка сообщения на сервер
            fetch('/messages/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'  // Добавьте CSRF-токен
                },
                body: JSON.stringify({ user_message: userInput })
            })
            .then(response => response.json())
            .then(data => {
                // Отображение ответа ИИ
                chatBox.innerHTML += `<div class="message ai">AI: ${data.ai_response}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight; // Прокрутка вниз
            });
        });

        document.getElementById('fullscreen-button').addEventListener('click', () => {
            const chatContainer = document.getElementById('chat-container');
            if (chatContainer.requestFullscreen) {
                chatContainer.requestFullscreen();
            } else if (chatContainer.mozRequestFullScreen) { // Firefox
                chatContainer.mozRequestFullScreen();
            } else if (chatContainer.webkitRequestFullscreen) { // Chrome, Safari и Opera
                chatContainer.webkitRequestFullscreen();
            } else if (chatContainer.msRequestFullscreen) { // IE/Edge
                chatContainer.msRequestFullscreen();
            }
        });
    </script>
</body>
</html>
